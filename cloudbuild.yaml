steps:
  # Build the Docker image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/messaging-frontend', '.']

  # Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/messaging-frontend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'messaging-frontend-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/messaging-frontend'
      - '--region'
      - 'us-central1'
      - '--port'
      - '80'
      # Remove --allow-unauthenticated if you want to lock it down to your domain only
      - '--allow-unauthenticated'